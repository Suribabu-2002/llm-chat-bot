<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Local AI Chat</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --surface3: #2e2e2e;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.13);
  --text: #e8e8e6; --text-muted: #888784; --text-hint: #4a4845;
  --accent: #a78bfa; --accent-dim: rgba(167,139,250,0.12);
  --user-bg: #242424; --radius: 14px; --sidebar-w: 240px;
}
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

#sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: width 0.2s ease; }
#sidebar.collapsed { width: 0; border-right: none; }
.sidebar-top { padding: 14px 12px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-logo { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding: 0 4px; }
.sidebar-logo .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 5px #4ade8066; flex-shrink: 0; }
.sidebar-logo span { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; }
#new-chat-btn { width: 100%; display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--accent-dim); border: 1px solid rgba(167,139,250,0.2); border-radius: 8px; color: var(--accent); font-size: 13px; font-family: inherit; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
#new-chat-btn:hover { background: rgba(167,139,250,0.18); }
#new-chat-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.section-label { font-size: 10px; font-weight: 500; color: var(--text-hint); letter-spacing: 0.08em; text-transform: uppercase; padding: 14px 16px 6px; flex-shrink: 0; }
#chat-list { flex: 1; overflow-y: auto; padding: 4px 8px 12px; }
#chat-list::-webkit-scrollbar { width: 3px; }
#chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.chat-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background 0.12s; }
.chat-item:hover { background: var(--surface2); }
.chat-item.active { background: var(--surface3); }
.chat-item-title { flex: 1; font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; }
.chat-item.active .chat-item-title { color: var(--text); }
.chat-item-del { width: 20px; height: 20px; border-radius: 5px; background: transparent; border: none; color: var(--text-hint); cursor: pointer; display: none; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; line-height: 1; transition: all 0.12s; }
.chat-item:hover .chat-item-del { display: flex; }
.chat-item-del:hover { color: #f87171; background: rgba(248,113,113,0.1); }
.sidebar-footer { padding: 10px 12px; border-top: 1px solid var(--border); flex-shrink: 0; }
.token-info { font-size: 11px; color: var(--text-hint); display: flex; align-items: center; justify-content: space-between; }
.token-bar-wrap { height: 3px; background: var(--surface2); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.token-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; opacity: 0.6; }

#main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
#topbar { padding: 11px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--surface); flex-shrink: 0; }
#toggle-sidebar { width: 30px; height: 30px; border-radius: 7px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
#toggle-sidebar:hover { background: var(--surface2); border-color: var(--border2); }
#toggle-sidebar svg { width: 14px; height: 14px; }
#chat-title { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.model-badge { font-size: 11px; color: var(--text-hint); background: var(--surface2); padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); white-space: nowrap; flex-shrink: 0; }

#queue-banner { display: none; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(251,191,36,0.06); border-bottom: 1px solid rgba(251,191,36,0.14); font-size: 12px; color: #fbbf24; flex-shrink: 0; }
#queue-banner svg { width: 14px; height: 14px; flex-shrink: 0; }

#messages { flex: 1; overflow-y: auto; padding: 28px 0; scroll-behavior: smooth; }
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.msg-wrap { max-width: 760px; margin: 0 auto; padding: 0 20px; }
.msg { display: flex; gap: 12px; margin-bottom: 28px; animation: fadeUp 0.15s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
.avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; margin-top: 2px; }
.avatar.ai { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(167,139,250,0.25); }
.avatar.user { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
.bubble { flex: 1; min-width: 0; }
.sender { font-size: 11px; font-weight: 500; color: var(--text-hint); margin-bottom: 5px; letter-spacing: 0.02em; }
.content { font-size: 15px; line-height: 1.75; color: var(--text); word-break: break-word; white-space: normal; }
.msg.user .content { background: var(--user-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 15px; display: inline-block; max-width: 100%; }
.thinking { display: flex; align-items: center; gap: 10px; padding: 5px 0; }
.thinking-dots { display: flex; gap: 5px; align-items: center; }
.thinking-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.5; animation: tdot 1.3s ease infinite; }
.thinking-dots span:nth-child(2) { animation-delay: 0.18s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.36s; }
@keyframes tdot { 0%,80%,100% { transform:scale(0.6); opacity:0.25; } 40% { transform:scale(1); opacity:1; } }
.thinking-label { font-size: 12px; color: var(--text-hint); animation: lpulse 2s ease infinite; }
@keyframes lpulse { 0%,100% { opacity:0.4; } 50% { opacity:1; } }

.empty-state { max-width: 460px; margin: 70px auto 0; text-align: center; padding: 0 24px; }
.empty-icon { width: 46px; height: 46px; background: var(--accent-dim); border: 1px solid rgba(167,139,250,0.2); border-radius: 13px; margin: 0 auto 18px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.empty-state h2 { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 7px; }
.empty-state p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
.suggestions { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-top: 22px; }
.suggestion-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); font-size: 13px; padding: 7px 13px; border-radius: 20px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.suggestion-btn:hover { border-color: rgba(167,139,250,0.35); color: var(--accent); background: var(--accent-dim); }

#input-area { padding: 14px 16px 16px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
.input-wrap { max-width: 760px; margin: 0 auto; display: flex; align-items: flex-end; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 11px; transition: border-color 0.15s; }
.input-wrap:focus-within { border-color: rgba(167,139,250,0.4); box-shadow: 0 0 0 3px rgba(167,139,250,0.06); }
#prompt { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 15px; font-family: inherit; line-height: 1.5; resize: none; max-height: 160px; min-height: 24px; overflow-y: auto; }
#prompt::placeholder { color: var(--text-hint); }
#prompt::-webkit-scrollbar { width: 3px; }
#prompt::-webkit-scrollbar-thumb { background: var(--border); }
#send-btn { width: 32px; height: 32px; border-radius: 8px; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; opacity: 0.35; pointer-events: none; }
#send-btn.active { opacity: 1; pointer-events: auto; }
#send-btn.active:hover { background: #c4b5fd; transform: scale(1.05); }
#send-btn.active:active { transform: scale(0.96); }
#send-btn svg { width: 15px; height: 15px; fill: #0f0f0f; }
#stop-btn { width: 32px; height: 32px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); cursor: pointer; display: none; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
#stop-btn:hover { border-color: #f87171; background: rgba(248,113,113,0.1); }
#stop-btn svg { width: 13px; height: 13px; fill: #f87171; }
.footer-note { max-width: 760px; margin: 7px auto 0; text-align: center; font-size: 11px; color: var(--text-hint); }

.error-msg { color: #f87171; font-size: 13px; }
.md h1,.md h2,.md h3,.md h4 { color: var(--text); font-weight: 500; margin: 1.15em 0 0.45em; line-height: 1.35; }
.md h1 { font-size: 19px; } .md h2 { font-size: 16px; } .md h3 { font-size: 15px; }
.md h1:first-child,.md h2:first-child,.md h3:first-child { margin-top: 0; }
.md p { margin: 0 0 0.8em; } .md p:last-child { margin-bottom: 0; }
.md strong { font-weight: 500; } .md em { font-style: italic; color: var(--text-muted); }
.md ul,.md ol { margin: 0.45em 0 0.8em 1.35em; }
.md li { margin: 0.2em 0; line-height: 1.7; }
.md blockquote { margin: 0.7em 0; padding: 0.55em 1em; border-left: 3px solid rgba(167,139,250,0.35); background: rgba(167,139,250,0.05); border-radius: 0 6px 6px 0; color: var(--text-muted); font-style: italic; }
.md code { font-family: "SF Mono","Fira Code",monospace; font-size: 13px; background: rgba(163,230,53,0.07); color: #a3e635; padding: 2px 5px; border-radius: 4px; border: 1px solid rgba(163,230,53,0.1); }
.md pre { margin: 0.8em 0; border-radius: 9px; background: #141414; border: 1px solid var(--border); overflow: hidden; }
.md pre code { display: block; padding: 0; background: transparent; border: none; color: var(--text); font-size: 13px; line-height: 1.6; overflow-x: auto; }
.code-block-wrap { position: relative; }
.code-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 13px; background: #1c1c1c; border-bottom: 1px solid var(--border); }
.code-lang { font-size: 11px; font-family: monospace; color: var(--text-hint); }
.copy-btn { font-size: 11px; color: var(--text-hint); background: transparent; border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.copy-btn:hover { color: var(--text-muted); border-color: var(--border2); }
.copy-btn.copied { color: #4ade80; border-color: rgba(74,222,128,0.3); }
.md pre code { padding: 13px 15px; }
.md table { width: 100%; border-collapse: collapse; margin: 0.8em 0; font-size: 14px; }
.md th { text-align: left; padding: 7px 11px; border-bottom: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); font-weight: 500; font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; }
.md td { padding: 7px 11px; border-bottom: 1px solid var(--border); vertical-align: top; }
.md tr:last-child td { border-bottom: none; }
.md a { color: var(--accent); text-decoration: none; }
.md a:hover { text-decoration: underline; }
.md hr { border: none; border-top: 1px solid var(--border); margin: 1.1em 0; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-top">
    <div class="sidebar-logo">
      <div class="dot"></div>
      <span>Local AI</span>
    </div>
    <button id="new-chat-btn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
      New chat
    </button>
  </div>
  <div class="section-label">Recents</div>
  <div id="chat-list"></div>
  <div class="sidebar-footer">
    <div class="token-info">
      <span>Context used</span>
      <span id="token-count">0 / 32k</span>
    </div>
    <div class="token-bar-wrap"><div class="token-bar" id="token-bar" style="width:0%"></div></div>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <button id="toggle-sidebar" title="Toggle sidebar">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="6" y1="2" x2="6" y2="14"/></svg>
    </button>
    <div id="chat-title">New chat</div>
    <div class="model-badge">qwen3.5:2b · localhost</div>
  </div>

  <div id="queue-banner">
    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 3a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 018 4zm0 7a1 1 0 110-2 1 1 0 010 2z"/></svg>
    <span id="queue-text">Waiting for a free slot…</span>
  </div>

  <div id="messages">
    <div class="msg-wrap" id="msg-container"></div>
  </div>

  <div id="input-area">
    <div class="input-wrap">
      <textarea id="prompt" placeholder="Message…" rows="1"></textarea>
      <button id="stop-btn" title="Stop"><svg viewBox="0 0 16 16"><rect x="3" y="3" width="10" height="10" rx="2"/></svg></button>
      <button id="send-btn" title="Send"><svg viewBox="0 0 16 16"><path d="M14 8L2 2l2 6-2 6z"/></svg></button>
    </div>
    <p class="footer-note">Streaming from localhost:3000 · history saved in browser</p>
  </div>
</div>

<script>
const messagesEl   = document.getElementById('messages');
const msgContainer = document.getElementById('msg-container');
const promptEl     = document.getElementById('prompt');
const sendBtn      = document.getElementById('send-btn');
const stopBtn      = document.getElementById('stop-btn');
const newChatBtn   = document.getElementById('new-chat-btn');
const chatList     = document.getElementById('chat-list');
const chatTitleEl  = document.getElementById('chat-title');
const tokenCountEl = document.getElementById('token-count');
const tokenBarEl   = document.getElementById('token-bar');
const toggleSbBtn  = document.getElementById('toggle-sidebar');
const sidebarEl    = document.getElementById('sidebar');
const queueBanner  = document.getElementById('queue-banner');
const queueText    = document.getElementById('queue-text');

const MAX_CTX = 32000;
let controller = null;
let isStreaming = false;
let activeChatId = null;

// ── Storage ──
const LS_KEY = 'ollama_chats_v1';
function loadAll()        { try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch { return {}; } }
function saveAll(chats)   { localStorage.setItem(LS_KEY, JSON.stringify(chats)); }
function getChat(id)      { return loadAll()[id] || null; }
function putChat(chat)    { const all = loadAll(); all[chat.id] = chat; saveAll(all); }
function removeChat(id)   { const all = loadAll(); delete all[id]; saveAll(all); }
function listChats()      { return Object.values(loadAll()).sort((a,b) => b.updatedAt - a.updatedAt); }
function makeChat()       { return { id: 'c' + Date.now(), title: 'New chat', messages: [], createdAt: Date.now(), updatedAt: Date.now() }; }

// ── Tokens (rough: 1 token ~ 4 chars) ──
function estTokens(msgs)  { return Math.round(msgs.reduce((s,m) => s + m.content.length, 0) / 4); }
function updateMeter(msgs) {
  const t = estTokens(msgs);
  const pct = Math.min((t / MAX_CTX) * 100, 100);
  tokenCountEl.textContent = t >= 1000 ? (t/1000).toFixed(1)+'k / 32k' : t+' / 32k';
  tokenBarEl.style.width = pct + '%';
  tokenBarEl.style.background = pct > 80 ? '#f87171' : pct > 55 ? '#fbbf24' : 'var(--accent)';
}

// ── Sidebar ──
function renderSidebar() {
  chatList.innerHTML = '';
  const chats = listChats();
  if (!chats.length) {
    chatList.innerHTML = '<div style="font-size:12px;color:var(--text-hint);padding:8px 16px 0">No chats yet</div>';
    return;
  }
  chats.forEach(c => {
    const el = document.createElement('div');
    el.className = 'chat-item' + (c.id === activeChatId ? ' active' : '');
    el.innerHTML = `<div class="chat-item-title">${esc(c.title)}</div><button class="chat-item-del" title="Delete">×</button>`;
    el.querySelector('.chat-item-del').addEventListener('click', e => { e.stopPropagation(); deleteChatUI(c.id); });
    el.addEventListener('click', () => switchChat(c.id));
    chatList.appendChild(el);
  });
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Switch / New / Delete ──
function switchChat(id) {
  if (isStreaming) return;
  activeChatId = id;
  const chat = getChat(id);
  if (!chat) return;
  chatTitleEl.textContent = chat.title;
  renderMessages(chat.messages);
  updateMeter(chat.messages);
  renderSidebar();
  promptEl.focus();
}

function startNewChat() {
  if (isStreaming) return;
  const chat = makeChat();
  putChat(chat);
  activeChatId = chat.id;
  chatTitleEl.textContent = 'New chat';
  renderMessages([]);
  updateMeter([]);
  renderSidebar();
  promptEl.focus();
}

function deleteChatUI(id) {
  removeChat(id);
  if (activeChatId === id) {
    const rest = listChats();
    rest.length > 0 ? switchChat(rest[0].id) : startNewChat();
  } else {
    renderSidebar();
  }
}

// ── Render message list ──
function renderMessages(messages) {
  msgContainer.innerHTML = '';
  if (!messages.length) { showEmpty(); return; }
  messages.forEach(m => addMsgDOM(m.role === 'user' ? 'user' : 'ai', m.content, false));
  scrollToBottom();
}

function showEmpty() {
  msgContainer.innerHTML = `<div class="empty-state">
    <div class="empty-icon">✦</div>
    <h2>What's on your mind?</h2>
    <p>Powered by your local Ollama instance. Nothing leaves your machine.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="fillPrompt('Explain async/await in JavaScript')">Explain async/await</button>
      <button class="suggestion-btn" onclick="fillPrompt('Write a Python function to flatten a nested list')">Flatten a list in Python</button>
      <button class="suggestion-btn" onclick="fillPrompt('What is the difference between REST and GraphQL?')">REST vs GraphQL</button>
      <button class="suggestion-btn" onclick="fillPrompt('How does garbage collection work in V8?')">V8 garbage collection</button>
    </div>
  </div>`;
}

// ── Markdown ──
marked.setOptions({ breaks: true, gfm: true });
const mdRenderer = new marked.Renderer();
mdRenderer.code = (code, lang) => {
  const l = lang || 'text';
  const e = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<div class="code-block-wrap"><div class="code-header"><span class="code-lang">${l}</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>${e}</code></pre></div>`;
};
marked.use({ renderer: mdRenderer });

function copyCode(btn) {
  const code = btn.closest('.code-block-wrap').querySelector('code').innerText;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
  });
}

function md(text) { return marked.parse(text); }

// ── DOM helpers ──
function addMsgDOM(role, text, animate = true) {
  const emptyEl = msgContainer.querySelector('.empty-state');
  if (emptyEl) emptyEl.remove();

  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  if (!animate) msg.style.animation = 'none';

  const av = document.createElement('div');
  av.className = `avatar ${role}`;
  av.textContent = role === 'ai' ? '✦' : 'U';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  const sender = document.createElement('div');
  sender.className = 'sender';
  sender.textContent = role === 'ai' ? 'Local AI' : 'You';

  const content = document.createElement('div');
  content.className = role === 'ai' ? 'content md' : 'content';
  if (role === 'user') content.textContent = text;
  else content.innerHTML = text ? md(text) : '';

  bubble.appendChild(sender);
  bubble.appendChild(content);
  msg.appendChild(av);
  msg.appendChild(bubble);
  msgContainer.appendChild(msg);
  scrollToBottom();
  return content;
}

function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }
function fillPrompt(text) { promptEl.value = text; promptEl.dispatchEvent(new Event('input')); promptEl.focus(); }

function setStreaming(val) {
  isStreaming = val;
  sendBtn.classList.toggle('active', !val && promptEl.value.trim().length > 0);
  sendBtn.style.display = val ? 'none' : 'flex';
  stopBtn.style.display = val ? 'flex' : 'none';
  promptEl.disabled = val;
}

// ── Events ──
promptEl.addEventListener('input', () => {
  promptEl.style.height = 'auto';
  promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + 'px';
  sendBtn.classList.toggle('active', promptEl.value.trim().length > 0 && !isStreaming);
});
promptEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!isStreaming && promptEl.value.trim()) sendMessage(); }
});
sendBtn.addEventListener('click', () => { if (!isStreaming && promptEl.value.trim()) sendMessage(); });
stopBtn.addEventListener('click', () => { if (controller) controller.abort(); });
newChatBtn.addEventListener('click', startNewChat);
toggleSbBtn.addEventListener('click', () => sidebarEl.classList.toggle('collapsed'));

// ── Send ──
async function sendMessage() {
  const text = promptEl.value.trim();
  if (!text) return;

  if (!activeChatId) { const c = makeChat(); putChat(c); activeChatId = c.id; }

  promptEl.value = '';
  promptEl.style.height = 'auto';
  promptEl.dispatchEvent(new Event('input'));

  const chat = getChat(activeChatId);
  chat.messages.push({ role: 'user', content: text });
  if (chat.messages.length === 1) chat.title = text.slice(0, 42) + (text.length > 42 ? '…' : '');
  chat.updatedAt = Date.now();
  putChat(chat);
  chatTitleEl.textContent = chat.title;
  renderSidebar();

  addMsgDOM('user', text);
  const aiContent = addMsgDOM('ai', '');
  const thinking = document.createElement('div');
  thinking.className = 'thinking';
  thinking.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div><span class="thinking-label">Thinking…</span>';
  aiContent.appendChild(thinking);

  setStreaming(true);
  controller = new AbortController();

  let rawBuf = '', sseBuf = '', hasReal = false, rafId = null;

  function scheduleRender() {
    if (rafId) return;
    rafId = requestAnimationFrame(() => {
      rafId = null;
      aiContent.innerHTML = md(rawBuf);
      scrollToBottom();
    });
  }

  try {
    const res = await fetch('http://localhost:3000/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chat.messages }),
      signal: controller.signal,
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const reader = res.body.getReader();
    const dec = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      sseBuf += dec.decode(value, { stream: true });
      const lines = sseBuf.split('\n');
      sseBuf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const raw = line.slice(5).trim();

        if (raw.startsWith('[QUEUE:')) {
          const pos = raw.match(/\[QUEUE:(\d+)\]/)?.[1];
          if (pos) { queueBanner.style.display = 'flex'; queueText.textContent = `${pos} request${pos>1?'s':''} ahead — waiting…`; }
          continue;
        }
        if (raw === '[DONE]') { queueBanner.style.display = 'none'; break; }

        queueBanner.style.display = 'none';
        let chunk; try { chunk = JSON.parse(raw); } catch { continue; }

        rawBuf += chunk;
        if (!hasReal && rawBuf.trim().length > 0) { hasReal = true; aiContent.innerHTML = ''; }
        if (hasReal) scheduleRender();
      }
    }

    if (rawBuf.trim()) {
      chat.messages.push({ role: 'assistant', content: rawBuf.trim() });
      chat.updatedAt = Date.now();
      putChat(chat);
      updateMeter(chat.messages);
    }

  } catch (err) {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    queueBanner.style.display = 'none';
    if (err.name === 'AbortError') {
      if (rawBuf.trim()) {
        chat.messages.push({ role: 'assistant', content: rawBuf.trim() });
        chat.updatedAt = Date.now(); putChat(chat);
        aiContent.innerHTML = md(rawBuf);
      } else {
        chat.messages.pop(); putChat(chat);
        aiContent.innerHTML = '<span style="color:var(--text-hint);font-style:italic">— stopped</span>';
      }
    } else {
      chat.messages.pop(); putChat(chat);
      aiContent.innerHTML = `<div class="error-msg">Could not reach localhost:3000<br><small style="color:var(--text-hint)">${err.message}</small></div>`;
    }
  } finally {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    if (rawBuf.trim()) aiContent.innerHTML = md(rawBuf);
    else if (!hasReal) aiContent.innerHTML = '<span style="color:var(--text-hint);font-style:italic">No response.</span>';
    controller = null;
    setStreaming(false);
    updateMeter(getChat(activeChatId)?.messages || []);
    scrollToBottom();
  }
}

// ── Boot ──
(function() {
  const chats = listChats();
  if (chats.length) { activeChatId = chats[0].id; switchChat(activeChatId); }
  else startNewChat();
})();
</script>
</body>
